name: Weekly Benchmark

on:
  schedule:
    - cron: "10 2 * * 3"
  workflow_dispatch:
    inputs:
      include_heavy_targets:
        description: "Include heavy offload targets (e.g. 70B on 24GB+RAM)"
        required: false
        default: false
        type: boolean
      extra_targets:
        description: "Extra targets CSV (example: mistral:7b=128,llama3.3:70b-instruct-q4_K_M=64)"
        required: false
        default: ""
        type: string
      benchmark_timeout_s:
        description: "Per-request timeout seconds"
        required: false
        default: "600"
        type: string

permissions:
  contents: read
  issues: write

env:
  LV_OLLAMA_ENDPOINT: http://127.0.0.1:11434
  OLLAMA_HOST: http://127.0.0.1:11434
  OLLAMA_MODELS: /mnt/d/Ollama
  LV_NETWORK_RETRY_DELAYS_S: "5,10,20"
  LV_WEEKLY_BASE_TARGETS: qwen3=128,deepseek-r1=128,qwen2.5=128,qwen3-coder=96,qwen3.5=96

jobs:
  benchmark-on-3090:
    runs-on: [self-hosted, Linux, X64, gpu, 3090]
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Classify checkout failure
        if: steps.checkout.conclusion == 'failure'
        run: |
          echo "failure_class=checkout_network_failure"
          echo "failure_detail=actions/checkout failed before benchmark scripts could run"
          echo "::error title=FailureClass::checkout_network_failure - actions/checkout failed before benchmark scripts could run"
          exit 1

      - name: Setup Python
        if: steps.checkout.conclusion == 'success'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve weekly targets
        id: resolve_targets
        if: steps.checkout.conclusion == 'success'
        run: |
          python scripts/resolve-weekly-targets.py \
            --endpoint "${LV_OLLAMA_ENDPOINT}" \
            --base-targets "${LV_WEEKLY_BASE_TARGETS}" \
            --retry-delays "${LV_NETWORK_RETRY_DELAYS_S}" \
            --output-file "src/data/weekly-target-plan.json" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Runner diagnostics (before preflight)
        if: steps.checkout.conclusion == 'success'
        env:
          LV_WEEKLY_TARGETS: ${{ steps.resolve_targets.outputs.resolved_targets_csv || env.LV_WEEKLY_BASE_TARGETS }}
        run: |
          python scripts/runner-diagnostics.py --required-targets "${LV_WEEKLY_TARGETS}" --json-out logs/runner-diagnostics-before.json

      - name: Ollama preflight
        if: steps.checkout.conclusion == 'success'
        env:
          LV_WEEKLY_TARGETS: ${{ steps.resolve_targets.outputs.resolved_targets_csv || env.LV_WEEKLY_BASE_TARGETS }}
        run: |
          set -o pipefail
          python scripts/ollama-preflight.py --required-targets "${LV_WEEKLY_TARGETS}" --restart-if-empty --require-local-process 2>&1 | tee logs/ollama-preflight-weekly.log

      - name: Weekly benchmark
        if: steps.checkout.conclusion == 'success'
        env:
          INPUT_INCLUDE_HEAVY: ${{ github.event.inputs.include_heavy_targets }}
          INPUT_EXTRA_TARGETS: ${{ github.event.inputs.extra_targets }}
          INPUT_TIMEOUT_S: ${{ github.event.inputs.benchmark_timeout_s }}
          LV_WEEKLY_TARGETS: ${{ steps.resolve_targets.outputs.resolved_targets_csv || env.LV_WEEKLY_BASE_TARGETS }}
          LV_MIN_SUCCESS_MODELS: "3"
          LV_AUTO_BACKFILL_TARGETS: "true"
          LV_AUTO_BACKFILL_TARGETS_MAX: "6"
          LV_AUTO_PRIORITY_TAGS: "qwen3:8b,deepseek-r1:14b,qwen2.5:14b,qwen3-coder:30b,qwen3.5:35b"
        run: |
          ARGS=()
          if [ -n "${INPUT_EXTRA_TARGETS}" ]; then
            ARGS+=(--extra-targets "${INPUT_EXTRA_TARGETS}")
          fi
          if [ "${INPUT_INCLUDE_HEAVY}" = "true" ]; then
            ARGS+=(--include-heavy-targets)
          fi
          if [ -n "${INPUT_TIMEOUT_S}" ]; then
            ARGS+=(--timeout "${INPUT_TIMEOUT_S}")
          fi
          python scripts/weekly-benchmark.py "${ARGS[@]}"

      - name: Cluster benchmark (optional multi-endpoint)
        if: steps.checkout.conclusion == 'success'
        env:
          LV_CLUSTER_ENDPOINTS: ${{ secrets.LV_CLUSTER_ENDPOINTS }}
        run: |
          if [ -z "${LV_CLUSTER_ENDPOINTS}" ]; then
            echo "LV_CLUSTER_ENDPOINTS not configured; skipping cluster benchmark."
            exit 0
          fi
          python scripts/cluster-benchmark.py --endpoints "${LV_CLUSTER_ENDPOINTS}" --min-endpoints 2 --allow-empty

      - name: Runner diagnostics snapshot (publish payload)
        if: always() && steps.checkout.conclusion == 'success'
        env:
          LV_WEEKLY_TARGETS: ${{ steps.resolve_targets.outputs.resolved_targets_csv || env.LV_WEEKLY_BASE_TARGETS }}
        run: |
          python scripts/runner-diagnostics.py --required-targets "${LV_WEEKLY_TARGETS}" --json-out src/data/runner-status.json

      - name: Runner diagnostics (on failure)
        if: failure() && steps.checkout.conclusion == 'success'
        env:
          LV_WEEKLY_TARGETS: ${{ steps.resolve_targets.outputs.resolved_targets_csv || env.LV_WEEKLY_BASE_TARGETS }}
        run: |
          python scripts/runner-diagnostics.py --required-targets "${LV_WEEKLY_TARGETS}" --json-out logs/runner-diagnostics-failure.json

      - name: Update pipeline status snapshot (weekly)
        id: pipeline_status_weekly
        if: always() && steps.checkout.conclusion == 'success'
        env:
          LV_JOB_STATUS: ${{ job.status }}
        run: |
          conclusion="success"
          if [ "${LV_JOB_STATUS}" != "success" ]; then
            conclusion="failure"
          fi

          failure_class="none"
          failure_detail=""
          if [ "${conclusion}" = "failure" ]; then
            if [ -f src/data/runner-status.json ]; then
              failure_class="$(python -c "import json, pathlib; p=pathlib.Path('src/data/runner-status.json'); d=json.loads(p.read_text(encoding='utf-8-sig')); s=d.get('summary',{}) if isinstance(d,dict) else {}; print(str(s.get('failure_class','')).strip())" 2>/dev/null || true)"
              failure_detail="$(python -c "import json, pathlib; p=pathlib.Path('src/data/runner-status.json'); d=json.loads(p.read_text(encoding='utf-8-sig')); s=d.get('summary',{}) if isinstance(d,dict) else {}; print(str(s.get('failure_detail','')).strip())" 2>/dev/null || true)"
            fi
            if [ -z "${failure_class}" ] || [ "${failure_class}" = "none" ]; then
              failure_class="weekly_benchmark_failed"
            fi
          fi

          python scripts/update-pipeline-status.py \
            --workflow-key "weekly_benchmark" \
            --workflow-name "Weekly Benchmark" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --status "completed" \
            --conclusion "${conclusion}" \
            --event "${GITHUB_EVENT_NAME}" \
            --head-sha "${GITHUB_SHA}" \
            --failure-class "${failure_class}" \
            --failure-detail "${failure_detail}"

          {
            echo "conclusion=${conclusion}"
            echo "failure_class=${failure_class}"
            echo "failure_detail<<EOF"
            echo "${failure_detail}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build pipeline SLO snapshot
        if: always() && steps.checkout.conclusion == 'success'
        run: python scripts/build-pipeline-slo.py

      - name: Upload benchmark collection artifact
        if: always() && steps.checkout.conclusion == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-collection
          if-no-files-found: error
          retention-days: 21
          path: |
            src/data/status.json
            src/data/benchmark-results.json
            src/data/cluster-benchmarks.json
            src/data/benchmark-changelog.json
            src/data/runner-status.json
            src/data/pipeline-status.json
            src/data/pipeline-slo.json
            src/data/weekly-target-plan.json
            logs
            public/screenshots

      - name: Alert issue (weekly checkout failure)
        if: always() && steps.checkout.conclusion == 'failure'
        uses: actions/github-script@v7
        env:
          ALERT_WORKFLOW: Weekly Benchmark
          ALERT_FAILURE_CLASS: checkout_network_failure
          ALERT_FAILURE_DETAIL: actions/checkout failed before benchmark scripts could run
          ALERT_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow = process.env.ALERT_WORKFLOW || "Workflow";
            const failureClass = process.env.ALERT_FAILURE_CLASS || "unknown_failure";
            const failureDetail = process.env.ALERT_FAILURE_DETAIL || "";
            const runUrl = process.env.ALERT_RUN_URL || "";
            const title = `[OPS-ALERT] ${workflow}: ${failureClass}`;
            const marker = `<!-- ops-alert:${workflow}:${failureClass} -->`;
            const now = new Date().toISOString();
            const message = `${marker}

            - Triggered at: ${now}
            - Workflow: ${workflow}
            - Failure class: \`${failureClass}\`
            - Detail: ${failureDetail || "-"}
            - Run: ${runUrl}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: message
              });
              core.info(`commented existing issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: message
              });
              core.info("created new ops alert issue");
            }

      - name: Alert issue (weekly failure)
        if: always() && failure() && steps.checkout.conclusion == 'success'
        uses: actions/github-script@v7
        env:
          ALERT_WORKFLOW: Weekly Benchmark
          ALERT_FAILURE_CLASS: ${{ steps.pipeline_status_weekly.outputs.failure_class }}
          ALERT_FAILURE_DETAIL: ${{ steps.pipeline_status_weekly.outputs.failure_detail }}
          ALERT_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow = process.env.ALERT_WORKFLOW || "Workflow";
            let failureClass = (process.env.ALERT_FAILURE_CLASS || "").trim();
            const failureDetail = (process.env.ALERT_FAILURE_DETAIL || "").trim();
            const runUrl = process.env.ALERT_RUN_URL || "";
            if (!failureClass || failureClass === "none") {
              failureClass = "weekly_benchmark_failed";
            }
            const title = `[OPS-ALERT] ${workflow}: ${failureClass}`;
            const marker = `<!-- ops-alert:${workflow}:${failureClass} -->`;
            const now = new Date().toISOString();
            const message = `${marker}

            - Triggered at: ${now}
            - Workflow: ${workflow}
            - Failure class: \`${failureClass}\`
            - Detail: ${failureDetail || "-"}
            - Run: ${runUrl}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: message
              });
              core.info(`commented existing issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: message
              });
              core.info("created new ops alert issue");
            }

      - name: Resolve alert issues on recovery (weekly)
        if: always() && success() && steps.checkout.conclusion == 'success'
        uses: actions/github-script@v7
        env:
          ALERT_WORKFLOW: Weekly Benchmark
          ALERT_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow = process.env.ALERT_WORKFLOW || "Workflow";
            const runUrl = process.env.ALERT_RUN_URL || "";
            const prefix = `[OPS-ALERT] ${workflow}:`;
            const now = new Date().toISOString();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            const targets = issues.filter((issue) => issue.title.startsWith(prefix));
            for (const issue of targets) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Recovered at ${now}. Latest successful run: ${runUrl}`
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed"
              });
              core.info(`closed recovered alert issue #${issue.number}`);
            }
