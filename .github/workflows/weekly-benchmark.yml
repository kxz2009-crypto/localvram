name: Weekly Benchmark

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      include_heavy_targets:
        description: "Include heavy offload targets (e.g. 70B on 24GB+RAM)"
        required: false
        default: false
        type: boolean
      extra_targets:
        description: "Extra targets CSV (example: mistral:7b=128,llama3.3:70b-instruct-q4_K_M=64)"
        required: false
        default: ""
        type: string
      benchmark_timeout_s:
        description: "Per-request timeout seconds"
        required: false
        default: "600"
        type: string

permissions:
  contents: write

jobs:
  benchmark-on-3090:
    runs-on: [self-hosted, Linux, X64, gpu, 3090]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Weekly benchmark
        env:
          INPUT_INCLUDE_HEAVY: ${{ github.event.inputs.include_heavy_targets }}
          INPUT_EXTRA_TARGETS: ${{ github.event.inputs.extra_targets }}
          INPUT_TIMEOUT_S: ${{ github.event.inputs.benchmark_timeout_s }}
        run: |
          ARGS=()
          if [ -n "${INPUT_EXTRA_TARGETS}" ]; then
            ARGS+=(--extra-targets "${INPUT_EXTRA_TARGETS}")
          fi
          if [ "${INPUT_INCLUDE_HEAVY}" = "true" ]; then
            ARGS+=(--include-heavy-targets)
          fi
          if [ -n "${INPUT_TIMEOUT_S}" ]; then
            ARGS+=(--timeout "${INPUT_TIMEOUT_S}")
          fi
          python scripts/weekly-benchmark.py "${ARGS[@]}"

      - name: Cluster benchmark
        run: python scripts/cluster-benchmark.py

      - name: Build model catalog
        run: python scripts/build-model-catalog.py

      - name: Build sitemap
        run: python scripts/build-sitemap.py

      - name: Commit benchmark updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/status.json src/data/benchmark-results.json src/data/cluster-benchmarks.json src/data/benchmark-changelog.json src/data/models.json src/data/model-catalog.json public/sitemap.xml public/screenshots logs
          git diff --cached --quiet || git commit -m "chore: weekly benchmark update"
          git push
