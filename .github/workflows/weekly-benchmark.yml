name: Weekly Benchmark

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      include_heavy_targets:
        description: "Include heavy offload targets (e.g. 70B on 24GB+RAM)"
        required: false
        default: false
        type: boolean
      extra_targets:
        description: "Extra targets CSV (example: mistral:7b=128,llama3.3:70b-instruct-q4_K_M=64)"
        required: false
        default: ""
        type: string
      benchmark_timeout_s:
        description: "Per-request timeout seconds"
        required: false
        default: "600"
        type: string

permissions:
  contents: read

jobs:
  benchmark-on-3090:
    runs-on: [self-hosted, Linux, X64, gpu, 3090]
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Classify checkout failure
        if: steps.checkout.conclusion == 'failure'
        run: |
          echo "failure_class=checkout_network_failure"
          echo "failure_detail=actions/checkout failed before benchmark scripts could run"
          echo "::error title=FailureClass::checkout_network_failure - actions/checkout failed before benchmark scripts could run"
          exit 1

      - name: Setup Python
        if: steps.checkout.conclusion == 'success'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Runner diagnostics (before preflight)
        if: steps.checkout.conclusion == 'success'
        env:
          LV_OLLAMA_ENDPOINT: http://127.0.0.1:11434
          OLLAMA_HOST: http://127.0.0.1:11434
          OLLAMA_MODELS: /mnt/d/Ollama
          LV_NETWORK_RETRY_DELAYS_S: "5,10,20"
          LV_WEEKLY_TARGETS: qwen3=128,deepseek-r1=128,qwen2.5=128,qwen3-coder=96,qwen3.5=96
        run: |
          python scripts/runner-diagnostics.py --required-targets "${LV_WEEKLY_TARGETS}" --json-out logs/runner-diagnostics-before.json

      - name: Ollama preflight
        if: steps.checkout.conclusion == 'success'
        env:
          LV_OLLAMA_ENDPOINT: http://127.0.0.1:11434
          OLLAMA_HOST: http://127.0.0.1:11434
          OLLAMA_MODELS: /mnt/d/Ollama
          LV_NETWORK_RETRY_DELAYS_S: "5,10,20"
          LV_WEEKLY_TARGETS: qwen3=128,deepseek-r1=128,qwen2.5=128,qwen3-coder=96,qwen3.5=96
        run: |
          python scripts/ollama-preflight.py --required-targets "${LV_WEEKLY_TARGETS}" --restart-if-empty

      - name: Weekly benchmark
        if: steps.checkout.conclusion == 'success'
        env:
          INPUT_INCLUDE_HEAVY: ${{ github.event.inputs.include_heavy_targets }}
          INPUT_EXTRA_TARGETS: ${{ github.event.inputs.extra_targets }}
          INPUT_TIMEOUT_S: ${{ github.event.inputs.benchmark_timeout_s }}
          LV_OLLAMA_ENDPOINT: http://127.0.0.1:11434
          OLLAMA_HOST: http://127.0.0.1:11434
          OLLAMA_MODELS: /mnt/d/Ollama
          LV_NETWORK_RETRY_DELAYS_S: "5,10,20"
          LV_WEEKLY_TARGETS: qwen3=128,deepseek-r1=128,qwen2.5=128,qwen3-coder=96,qwen3.5=96
          LV_MIN_SUCCESS_MODELS: "3"
          LV_AUTO_BACKFILL_TARGETS: "true"
          LV_AUTO_BACKFILL_TARGETS_MAX: "6"
          LV_AUTO_PRIORITY_TAGS: "qwen3:8b,deepseek-r1:14b,qwen2.5:14b,qwen3-coder:30b,qwen3.5:35b"
        run: |
          ARGS=()
          if [ -n "${INPUT_EXTRA_TARGETS}" ]; then
            ARGS+=(--extra-targets "${INPUT_EXTRA_TARGETS}")
          fi
          if [ "${INPUT_INCLUDE_HEAVY}" = "true" ]; then
            ARGS+=(--include-heavy-targets)
          fi
          if [ -n "${INPUT_TIMEOUT_S}" ]; then
            ARGS+=(--timeout "${INPUT_TIMEOUT_S}")
          fi
          python scripts/weekly-benchmark.py "${ARGS[@]}"

      - name: Cluster benchmark (optional multi-endpoint)
        if: steps.checkout.conclusion == 'success'
        env:
          LV_CLUSTER_ENDPOINTS: ${{ secrets.LV_CLUSTER_ENDPOINTS }}
        run: |
          if [ -z "${LV_CLUSTER_ENDPOINTS}" ]; then
            echo "LV_CLUSTER_ENDPOINTS not configured; skipping cluster benchmark."
            exit 0
          fi
          python scripts/cluster-benchmark.py --endpoints "${LV_CLUSTER_ENDPOINTS}" --min-endpoints 2 --allow-empty

      - name: Runner diagnostics snapshot (publish payload)
        if: always() && steps.checkout.conclusion == 'success'
        env:
          LV_OLLAMA_ENDPOINT: http://127.0.0.1:11434
          OLLAMA_HOST: http://127.0.0.1:11434
          OLLAMA_MODELS: /mnt/d/Ollama
          LV_NETWORK_RETRY_DELAYS_S: "5,10,20"
          LV_WEEKLY_TARGETS: qwen3=128,deepseek-r1=128,qwen2.5=128,qwen3-coder=96,qwen3.5=96
        run: |
          python scripts/runner-diagnostics.py --required-targets "${LV_WEEKLY_TARGETS}" --json-out src/data/runner-status.json

      - name: Runner diagnostics (on failure)
        if: failure() && steps.checkout.conclusion == 'success'
        env:
          LV_OLLAMA_ENDPOINT: http://127.0.0.1:11434
          OLLAMA_HOST: http://127.0.0.1:11434
          OLLAMA_MODELS: /mnt/d/Ollama
          LV_NETWORK_RETRY_DELAYS_S: "5,10,20"
          LV_WEEKLY_TARGETS: qwen3=128,deepseek-r1=128,qwen2.5=128,qwen3-coder=96,qwen3.5=96
        run: |
          python scripts/runner-diagnostics.py --required-targets "${LV_WEEKLY_TARGETS}" --json-out logs/runner-diagnostics-failure.json

      - name: Upload benchmark collection artifact
        if: always() && steps.checkout.conclusion == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-collection
          if-no-files-found: error
          retention-days: 21
          path: |
            src/data/status.json
            src/data/benchmark-results.json
            src/data/cluster-benchmarks.json
            src/data/benchmark-changelog.json
            src/data/runner-status.json
            logs
            public/screenshots
