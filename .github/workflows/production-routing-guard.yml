name: Production Routing Guard

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:
    inputs:
      zh_hreflang_expectation:
        description: "zh-CN hreflang expectation (absent|present|skip)"
        required: false
        default: "present"
      skip_content_checks:
        description: "Skip hreflang/content checks and only verify route status/redirects"
        required: false
        default: "false"

permissions:
  contents: read
  issues: write

jobs:
  verify-production-routing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Verify production i18n routing
        id: verify_production_i18n
        env:
          INPUT_ZH_HREFLANG_EXPECTATION: ${{ github.event.inputs.zh_hreflang_expectation }}
          INPUT_SKIP_CONTENT_CHECKS: ${{ github.event.inputs.skip_content_checks }}
          ZH_HREFLANG_EXPECTATION: ${{ vars.ZH_HREFLANG_EXPECTATION }}
          SKIP_CONTENT_CHECKS: ${{ vars.PROD_VERIFY_SKIP_CONTENT_CHECKS }}
        run: |
          mkdir -p logs
          set -o pipefail
          zh_expectation="${INPUT_ZH_HREFLANG_EXPECTATION:-${ZH_HREFLANG_EXPECTATION:-present}}"
          skip_content="${INPUT_SKIP_CONTENT_CHECKS:-${SKIP_CONTENT_CHECKS:-false}}"
          extra_args=()
          if [ "${skip_content}" = "true" ]; then
            extra_args+=("-SkipContentChecks")
          fi
          echo "[verify-production-i18n] start $(date -u +"%Y-%m-%dT%H:%M:%SZ")" | tee logs/verify-production-i18n.log
          echo "[verify-production-i18n] zh_hreflang_expectation=${zh_expectation}" | tee -a logs/verify-production-i18n.log
          echo "[verify-production-i18n] skip_content_checks=${skip_content}" | tee -a logs/verify-production-i18n.log
          pwsh -File scripts/verify-production-i18n.ps1 -ComDomain "https://localvram.com" -CnDomain "https://localvram.cn" -ZhHreflangExpectation "${zh_expectation}" "${extra_args[@]}" 2>&1 | tee -a logs/verify-production-i18n.log
          status=${PIPESTATUS[0]}
          echo "[verify-production-i18n] exit_code=${status}" | tee -a logs/verify-production-i18n.log
          if [ "${status}" -ne 0 ]; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'production_routing_drift','failure_detail':'verify-production-i18n.ps1 failed against production domains','verify_exit_code':${status}}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::production_routing_drift - production routing verification failed"
            exit 1
          fi

      - name: Alert issue (routing drift)
        id: alert_issue
        if: always() && failure()
        uses: actions/github-script@v8
        env:
          ALERT_WORKFLOW: Production Routing Guard
          ALERT_FAILURE_CLASS: production_routing_drift
          ALERT_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs = require("node:fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow = process.env.ALERT_WORKFLOW || "Workflow";
            const failureClass = process.env.ALERT_FAILURE_CLASS || "production_routing_drift";
            const runUrl = process.env.ALERT_RUN_URL || "";
            const title = `[OPS-ALERT] ${workflow}: ${failureClass}`;
            const marker = `<!-- ops-alert:${workflow}:${failureClass} -->`;
            const now = new Date().toISOString();
            let failureDetail = "verify-production-i18n.ps1 failed against production domains";
            try {
              const raw = fs.readFileSync("logs/failure-context.json", "utf-8");
              const parsed = JSON.parse(raw);
              if (parsed && typeof parsed.failure_detail === "string" && parsed.failure_detail.length > 0) {
                failureDetail = parsed.failure_detail;
              }
              if (parsed && parsed.verify_exit_code !== undefined) {
                failureDetail = `${failureDetail} (exit_code=${parsed.verify_exit_code})`;
              }
            } catch (_) {}
            const body = `${marker}

            - Triggered at: ${now}
            - Workflow: ${workflow}
            - Failure class: \`${failureClass}\`
            - Detail: ${failureDetail}
            - Run: ${runUrl}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
            }

      - name: Resolve alert issues on recovery (routing guard)
        id: resolve_issue
        if: always() && success()
        uses: actions/github-script@v8
        env:
          ALERT_WORKFLOW: Production Routing Guard
          ALERT_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow = process.env.ALERT_WORKFLOW || "Workflow";
            const runUrl = process.env.ALERT_RUN_URL || "";
            const prefix = `[OPS-ALERT] ${workflow}:`;
            const now = new Date().toISOString();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            const targets = issues.filter((issue) => issue.title.startsWith(prefix));
            for (const issue of targets) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Recovered at ${now}. Latest successful run: ${runUrl}`
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed"
              });
            }

      - name: Publish workflow summary
        if: ${{ always() }}
        run: |
          {
            echo "## Production Routing Guard";
            echo "";
            echo "- verify-production-i18n: ${{ steps.verify_production_i18n.outcome }}";
            echo "- alert-issue: ${{ steps.alert_issue.outcome }}";
            echo "- resolve-issue: ${{ steps.resolve_issue.outcome }}";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload routing guard artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: production-routing-guard
          if-no-files-found: warn
          path: |
            logs/verify-production-i18n.log
            logs/failure-context.json
