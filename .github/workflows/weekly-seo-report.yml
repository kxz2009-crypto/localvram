name: Weekly SEO Report

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly-seo-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare logs
        run: mkdir -p logs

      - name: Snapshot data freshness
        run: python scripts/report-data-freshness.py | tee logs/data-freshness.log

      - name: Validate Search Console snapshot for report
        run: |
          python scripts/check-search-console-coverage.py \
            --file "src/data/search-console-keywords.json" \
            --locales "en" \
            --max-age-hours 240 \
            --min-items-per-locale 1 \
            --allow-stub-data true | tee logs/search-console-coverage.log

      - name: Dry-run content opportunities refresh
        run: python scripts/refresh-content-opportunities.py --dry-run | tee logs/opportunities-refresh.log

      - name: Build weekly SEO markdown report
        run: |
          python - <<'PY'
from pathlib import Path
import datetime as dt
import json

root = Path(".")
status_path = root / "src" / "data" / "status.json"
keywords_path = root / "src" / "data" / "search-console-keywords.json"
opps_path = root / "src" / "data" / "content-opportunities.json"
report_path = root / "logs" / "weekly-seo-report.md"

status = json.loads(status_path.read_text(encoding="utf-8"))
keywords_payload = json.loads(keywords_path.read_text(encoding="utf-8"))
opps_payload = json.loads(opps_path.read_text(encoding="utf-8"))

items = keywords_payload.get("items", []) if isinstance(keywords_payload, dict) else []
items = [x for x in items if isinstance(x, dict)]
items.sort(key=lambda x: int(x.get("clicks", 0) or 0), reverse=True)

opps = opps_payload.get("items", []) if isinstance(opps_payload, dict) else []
opps = [x for x in opps if isinstance(x, dict)]
opps.sort(
    key=lambda x: (
        int(x.get("search_intent_score", 0) or 0)
        * int(x.get("commercial_intent_score", 0) or 0)
        * int(x.get("freshness_gap_score", 0) or 0)
    ),
    reverse=True,
)

def fmt_num(value):
    try:
        return str(int(value))
    except Exception:
        return "0"

def fmt_pct(value):
    try:
        return f"{float(value) * 100:.1f}%"
    except Exception:
        return "0.0%"

generated_at = dt.datetime.now(dt.timezone.utc).isoformat().replace("+00:00", "Z")
lines = []
lines.append("# Weekly SEO Report")
lines.append("")
lines.append(f"- Generated at: {generated_at}")
lines.append(f"- search_console.updated_at: {keywords_payload.get('updated_at', 'unknown')}")
lines.append(f"- status.last_verified: {status.get('last_verified', 'unknown')}")
lines.append(f"- status.freshness_score: {status.get('freshness_score', 'unknown')}")
lines.append("")
lines.append("## Top Search Queries (by clicks)")
lines.append("")
lines.append("| Keyword | Clicks | Impressions | CTR | Position | Landing |")
lines.append("| --- | ---: | ---: | ---: | ---: | --- |")
for row in items[:10]:
    lines.append(
        "| {keyword} | {clicks} | {impr} | {ctr} | {pos} | {landing} |".format(
            keyword=str(row.get("keyword", row.get("query", ""))).replace("|", " ").strip() or "-",
            clicks=fmt_num(row.get("clicks", 0)),
            impr=fmt_num(row.get("impressions", 0)),
            ctr=fmt_pct(row.get("ctr", 0)),
            pos=f"{float(row.get('position', 0) or 0):.1f}",
            landing=str(row.get("landing", "")).replace("|", " ").strip() or "-",
        )
    )
lines.append("")
lines.append("## Top Content Opportunities")
lines.append("")
lines.append("| Topic | Intent | Commercial | Freshness | Score |")
lines.append("| --- | ---: | ---: | ---: | ---: |")
for row in opps[:10]:
    intent = int(row.get("search_intent_score", 0) or 0)
    commercial = int(row.get("commercial_intent_score", 0) or 0)
    freshness = int(row.get("freshness_gap_score", 0) or 0)
    score = intent * commercial * freshness
    lines.append(
        f"| {str(row.get('keyword', row.get('slug', '-'))).replace('|', ' ').strip() or '-'} | {intent} | {commercial} | {freshness} | {score} |"
    )

report_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
print(f"weekly_seo_report={report_path}")
PY

      - name: Publish workflow summary
        run: cat logs/weekly-seo-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SEO report artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-seo-report
          path: |
            logs/weekly-seo-report.md
            logs/data-freshness.log
            logs/search-console-coverage.log
            logs/opportunities-refresh.log
