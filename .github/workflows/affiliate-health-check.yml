name: Affiliate Health Check

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  verify-affiliate-links:
    runs-on: ubuntu-latest
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_AFFILIATE_EVENTS_NAMESPACE_ID: ${{ secrets.CF_AFFILIATE_EVENTS_NAMESPACE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify affiliate link mappings and live redirects
        run: |
          python scripts/refresh-affiliate-funnel.py \
            --verify-only \
            --verify-links \
            --verify-base-url "https://localvram.com" \
            --verify-timeout-s 20

      - name: Validate Cloudflare KV sync config
        id: kv_config
        run: |
          if [ -z "${CF_ACCOUNT_ID}" ] || [ -z "${CF_API_TOKEN}" ] || [ -z "${CF_AFFILIATE_EVENTS_NAMESPACE_ID}" ]; then
            echo "kv_sync_ready=false" >> "${GITHUB_OUTPUT}"
            echo "::warning title=MissingConfig::CF_ACCOUNT_ID/CF_API_TOKEN/CF_AFFILIATE_EVENTS_NAMESPACE_ID missing; continue with existing funnel snapshot."
            exit 0
          fi
          echo "kv_sync_ready=true" >> "${GITHUB_OUTPUT}"

      - name: Export affiliate events from Cloudflare KV
        if: steps.kv_config.outputs.kv_sync_ready == 'true'
        id: kv_export
        run: |
          if python scripts/export-affiliate-kv-events.py \
            --output-file logs/affiliate-events-export.json \
            --max-keys 5000; then
            echo "kv_export_ok=true" >> "${GITHUB_OUTPUT}"
          else
            echo "kv_export_ok=false" >> "${GITHUB_OUTPUT}"
            echo "::warning title=AffiliateKVSyncSkipped::Cloudflare KV export failed; continue with existing funnel snapshot."
            exit 0
          fi

      - name: Refresh affiliate funnel snapshot from KV export
        if: steps.kv_export.outputs.kv_export_ok == 'true'
        run: |
          python scripts/refresh-affiliate-funnel.py \
            --source-file logs/affiliate-events-export.json \
            --source-format json \
            --source-label cloudflare_kv_api_sync \
            --skip-quality-gate

      - name: Enforce affiliate funnel health gate
        run: |
          python scripts/check-affiliate-funnel-health.py \
            --funnel-file src/data/conversion-funnel.json \
            --min-organic-clicks-for-zero-alert 20 \
            --max-search-console-age-hours 240
