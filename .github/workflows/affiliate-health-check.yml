name: Affiliate Health Check

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  verify-affiliate-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify affiliate link mappings and live redirects
        run: |
          python scripts/refresh-affiliate-funnel.py \
            --verify-only \
            --verify-links \
            --verify-base-url "https://localvram.com" \
            --verify-timeout-s 20
