name: Locale KPI Refresh (72h Cadence)

on:
  schedule:
    - cron: "20 2 */3 * *"
  workflow_dispatch:
    inputs:
      locales:
        description: "Locales CSV to refresh"
        required: false
        default: "es,pt,ja,fr,de,ko,ru,ar,hi,id"
        type: string
      date:
        description: "ISO date override (YYYY-MM-DD). Empty uses UTC today."
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  refresh-kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh locale KPI rows
        env:
          INPUT_LOCALES: ${{ github.event.inputs.locales }}
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          LOCALES="${INPUT_LOCALES}"
          if [ -z "${LOCALES}" ]; then
            LOCALES="es,pt,ja,fr,de,ko,ru,ar,hi,id"
          fi

          DATE_ARG="${INPUT_DATE}"
          if [ -z "${DATE_ARG}" ]; then
            DATE_ARG="$(date -u +%F)"
          fi

          python scripts/refresh-locale-kpi.py --date "${DATE_ARG}" --locales "${LOCALES}"

      - name: Commit KPI tracker update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/seo-ops/locale-kpi-tracker.csv

          if git diff --cached --quiet; then
            echo "locale_kpi_refresh=no_changes"
            exit 0
          fi

          git commit -m "chore: refresh locale kpi tracker"
          git push
