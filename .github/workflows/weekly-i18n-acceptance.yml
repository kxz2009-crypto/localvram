name: Weekly i18n Acceptance

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  issues: write

jobs:
  weekly-i18n-acceptance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm install

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Prepare logs
        run: mkdir -p logs

      - name: i18n readiness
        id: readiness
        run: npm run i18n:readiness | tee logs/i18n-readiness.log

      - name: i18n locale link check
        id: locale_links
        run: npm run check:locale-links | tee logs/i18n-locale-links.log

      - name: i18n translation QA
        id: qa_copy
        run: npm run i18n:qa-copy | tee logs/i18n-qa-copy.log

      - name: i18n sitemap parity report
        id: sitemap_report
        run: npm run i18n:sitemap-report | tee logs/i18n-sitemap-report.log

      - name: i18n section parity summary
        id: section_parity_summary
        run: npm run i18n:section-parity-summary | tee logs/i18n-section-parity-summary.log

      - name: i18n key section parity check
        id: section_parity_check
        run: npm run i18n:check-section-parity | tee logs/i18n-section-parity.log

      - name: i18n section parity diff vs previous success
        id: section_parity_diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/prev-artifact logs
          prev_run_id=$(gh api "/repos/${{ github.repository }}/actions/workflows/weekly-i18n-acceptance.yml/runs?status=success&per_page=20" | jq -r '.workflow_runs[] | select((.id|tostring) != "${{ github.run_id }}") | .id' | head -n 1)
          if [ -z "${prev_run_id}" ] || [ "${prev_run_id}" = "null" ]; then
            echo "previous_success_run_id=none" | tee logs/i18n-section-parity-diff.log
            python scripts/diff-i18n-section-parity.py --current dist/seo-audit/i18n-section-parity-summary.json --out dist/seo-audit/i18n-section-parity-diff.json | tee -a logs/i18n-section-parity-diff.log
          else
            echo "previous_success_run_id=${prev_run_id}" | tee logs/i18n-section-parity-diff.log
            prev_artifact_id=$(gh api "/repos/${{ github.repository }}/actions/runs/${prev_run_id}/artifacts?per_page=100" | jq -r '.artifacts[] | select(.name=="weekly-i18n-acceptance" and .expired==false) | .id' | head -n 1)
            if [ -z "${prev_artifact_id}" ] || [ "${prev_artifact_id}" = "null" ]; then
              echo "previous_artifact_id=none" | tee -a logs/i18n-section-parity-diff.log
              python scripts/diff-i18n-section-parity.py --current dist/seo-audit/i18n-section-parity-summary.json --out dist/seo-audit/i18n-section-parity-diff.json | tee -a logs/i18n-section-parity-diff.log
            else
              echo "previous_artifact_id=${prev_artifact_id}" | tee -a logs/i18n-section-parity-diff.log
              gh api "/repos/${{ github.repository }}/actions/artifacts/${prev_artifact_id}/zip" > .tmp/prev-artifact/prev.zip
              unzip -q .tmp/prev-artifact/prev.zip -d .tmp/prev-artifact/unpacked
              prev_summary=".tmp/prev-artifact/unpacked/logs/seo-audit/i18n-section-parity-summary.json"
              if [ ! -f "${prev_summary}" ]; then
                prev_summary=".tmp/prev-artifact/unpacked/dist/seo-audit/i18n-section-parity-summary.json"
              fi
              if [ -f "${prev_summary}" ]; then
                python scripts/diff-i18n-section-parity.py --current dist/seo-audit/i18n-section-parity-summary.json --previous "${prev_summary}" --out dist/seo-audit/i18n-section-parity-diff.json | tee -a logs/i18n-section-parity-diff.log
              else
                echo "previous_summary_file=missing" | tee -a logs/i18n-section-parity-diff.log
                python scripts/diff-i18n-section-parity.py --current dist/seo-audit/i18n-section-parity-summary.json --out dist/seo-audit/i18n-section-parity-diff.json | tee -a logs/i18n-section-parity-diff.log
              fi
            fi
          fi

      - name: Preserve section parity artifacts
        id: preserve_parity_artifacts
        if: ${{ always() }}
        run: |
          mkdir -p logs/seo-audit
          for f in i18n-sitemap-section-report.json i18n-section-parity-summary.json i18n-section-parity-diff.json; do
            src="dist/seo-audit/${f}"
            dst="logs/seo-audit/${f}"
            if [ -f "${src}" ]; then
              cp "${src}" "${dst}"
            else
              echo "[warn] missing artifact source: ${src}" | tee -a logs/i18n-section-parity-diff.log
            fi
          done

      - name: Quality gate
        id: quality_gate
        run: npm run check:quality | tee logs/check-quality.log

      - name: Build
        id: build
        run: npm run build | tee logs/build.log
        env:
          ASTRO_TELEMETRY_DISABLED: "1"

      - name: Verify production i18n routes
        id: verify_production_i18n
        run: |
          set -o pipefail
          echo "[verify-production-i18n] start $(date -u +"%Y-%m-%dT%H:%M:%SZ")" | tee logs/verify-production-i18n.log
          pwsh -File scripts/verify-production-i18n.ps1 -ComDomain "https://localvram.com" -CnDomain "https://localvram.cn" 2>&1 | tee -a logs/verify-production-i18n.log
          status=${PIPESTATUS[0]}
          echo "[verify-production-i18n] exit_code=${status}" | tee -a logs/verify-production-i18n.log
          exit ${status}

      - name: Create weekly rollback checkpoint tag
        id: rollback_checkpoint_tag
        if: ${{ success() }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force
          tag_name="rollback-i18n-week-$(date -u +%Y%m%d)"
          if git rev-parse -q --verify "refs/tags/${tag_name}" >/dev/null; then
            echo "rollback checkpoint tag already exists: ${tag_name}" | tee logs/rollback-checkpoint-tag.log
          else
            git tag -a "${tag_name}" -m "Weekly i18n acceptance checkpoint run ${{ github.run_id }}" "${{ github.sha }}"
            git push origin "${tag_name}"
            echo "rollback checkpoint tag created: ${tag_name}" | tee logs/rollback-checkpoint-tag.log
          fi

      - name: Publish workflow summary
        if: ${{ always() }}
        run: |
          {
            echo "## Weekly i18n Acceptance";
            echo "";
            echo "- readiness: ${{ steps.readiness.outcome }}";
            echo "- locale-links: ${{ steps.locale_links.outcome }}";
            echo "- qa-copy: ${{ steps.qa_copy.outcome }}";
            echo "- sitemap-report: ${{ steps.sitemap_report.outcome }}";
            echo "- section-parity-summary: ${{ steps.section_parity_summary.outcome }}";
            echo "- section-parity: ${{ steps.section_parity_check.outcome }}";
            echo "- section-parity-diff: ${{ steps.section_parity_diff.outcome }}";
            echo "- preserve-parity-artifacts: ${{ steps.preserve_parity_artifacts.outcome }}";
            echo "- quality-gate: ${{ steps.quality_gate.outcome }}";
            echo "- build: ${{ steps.build.outcome }}";
            echo "- verify-production-i18n: ${{ steps.verify_production_i18n.outcome }}";
            echo "- rollback-checkpoint-tag: ${{ steps.rollback_checkpoint_tag.outcome }}";
            if [ -f logs/seo-audit/i18n-section-parity-diff.json ]; then
              drift=$(python -c "import json;print('true' if json.load(open('logs/seo-audit/i18n-section-parity-diff.json', encoding='utf-8')).get('has_drift') else 'false')")
              echo "- section-parity-drift-detected: ${drift}";
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload acceptance artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: weekly-i18n-acceptance
          if-no-files-found: warn
          path: |
            logs/i18n-readiness.log
            logs/i18n-locale-links.log
            logs/i18n-qa-copy.log
            logs/i18n-sitemap-report.log
            logs/i18n-section-parity-summary.log
            logs/i18n-section-parity.log
            logs/i18n-section-parity-diff.log
            logs/seo-audit/i18n-sitemap-section-report.json
            logs/seo-audit/i18n-section-parity-summary.json
            logs/seo-audit/i18n-section-parity-diff.json
            logs/check-quality.log
            logs/build.log
            logs/verify-production-i18n.log
            logs/rollback-checkpoint-tag.log
            dist/seo-audit

      - name: Open or update failure issue
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          READINESS: ${{ steps.readiness.outcome }}
          LOCALE_LINKS: ${{ steps.locale_links.outcome }}
          QA_COPY: ${{ steps.qa_copy.outcome }}
          SITEMAP_REPORT: ${{ steps.sitemap_report.outcome }}
          SECTION_PARITY_SUMMARY: ${{ steps.section_parity_summary.outcome }}
          SECTION_PARITY_CHECK: ${{ steps.section_parity_check.outcome }}
          SECTION_PARITY_DIFF: ${{ steps.section_parity_diff.outcome }}
          PRESERVE_ARTIFACTS: ${{ steps.preserve_parity_artifacts.outcome }}
          QUALITY_GATE: ${{ steps.quality_gate.outcome }}
          BUILD: ${{ steps.build.outcome }}
          VERIFY_PROD_I18N: ${{ steps.verify_production_i18n.outcome }}
          ROLLBACK_TAG: ${{ steps.rollback_checkpoint_tag.outcome }}
        run: |
          set -euo pipefail
          title="[i18n] Weekly acceptance failure tracker"
          body_file=".tmp/weekly-i18n-failure-issue.md"
          mkdir -p .tmp
          cat > "${body_file}" <<EOF
          Weekly i18n acceptance failed.

          - run: ${RUN_URL}
          - commit: ${{ github.sha }}
          - actor: ${{ github.actor }}
          - triggered_by: ${{ github.event_name }}

          Step outcomes:
          - readiness: ${READINESS}
          - locale-links: ${LOCALE_LINKS}
          - qa-copy: ${QA_COPY}
          - sitemap-report: ${SITEMAP_REPORT}
          - section-parity-summary: ${SECTION_PARITY_SUMMARY}
          - section-parity: ${SECTION_PARITY_CHECK}
          - section-parity-diff: ${SECTION_PARITY_DIFF}
          - preserve-parity-artifacts: ${PRESERVE_ARTIFACTS}
          - quality-gate: ${QUALITY_GATE}
          - build: ${BUILD}
          - verify-production-i18n: ${VERIFY_PROD_I18N}
          - rollback-checkpoint-tag: ${ROLLBACK_TAG}

          Please inspect the workflow summary and uploaded artifacts from this run.
          EOF

          issue_number=$(gh issue list --state open --search "\"${title}\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "${issue_number}" ]; then
            gh issue comment "${issue_number}" --body-file "${body_file}"
            echo "Updated issue #${issue_number}"
          else
            gh issue create --title "${title}" --body-file "${body_file}"
            echo "Created new issue: ${title}"
          fi
