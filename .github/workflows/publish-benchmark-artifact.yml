name: Publish Benchmark Artifact

on:
  workflow_run:
    workflows: ["Weekly Benchmark"]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Weekly Benchmark run id to publish (optional for workflow_run trigger)"
        required: false
        default: ""
        type: string
      retry_delays_s:
        description: "Base retry delays for artifact download and push (CSV seconds)"
        required: false
        default: "5,10,20"
        type: string
      rate_limit_delay_s:
        description: "Minimum retry delay when 429/rate-limit is detected (seconds)"
        required: false
        default: "60"
        type: string
      apply_retirement_candidates:
        description: "Auto-apply reviewed retirement candidates into retired-models.json"
        required: false
        default: false
        type: boolean
      retirement_min_stale_runs:
        description: "Auto-review minimum stale run index threshold"
        required: false
        default: "3"
        type: string
      retirement_max_seen_ok_count:
        description: "Auto-review max historical success count for auto-approval"
        required: false
        default: "2"
        type: string

permissions:
  actions: read
  contents: write
  issues: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare logs dir
        if: always() && steps.checkout.conclusion == 'success'
        run: mkdir -p logs

      - name: Resolve source run id
        id: source
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.source_run_id }}" ]; then
            RUN_ID="${{ github.event.inputs.source_run_id }}"
          fi
          if [ -z "${RUN_ID}" ]; then
            mkdir -p logs
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'artifact_download_failure','failure_detail':'missing source run id'}, ensure_ascii=False), encoding='utf-8')"
            echo "failure_class=artifact_download_failure"
            echo "failure_detail=missing source run id"
            echo "::error title=FailureClass::artifact_download_failure - missing source run id"
            exit 1
          fi
          echo "run_id=${RUN_ID}" >>"${GITHUB_OUTPUT}"
          echo "source_run_id=${RUN_ID}"

      - name: Resolve source run metadata
        id: source_meta
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ steps.source.outputs.run_id }}
        run: |
          mkdir -p logs
          if ! gh run view "${SOURCE_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --json status,conclusion,event,headSha,updatedAt,url > logs/source-run-meta.json; then
            python -c "import json, pathlib, os; rid=os.environ.get('SOURCE_RUN_ID',''); pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'source_run_metadata_failure','failure_detail':f'failed to resolve source run metadata for run {rid}'}, ensure_ascii=False), encoding='utf-8')"
            echo "failure_class=source_run_metadata_failure"
            echo "failure_detail=failed to resolve source run metadata for run ${SOURCE_RUN_ID}"
            echo "::error title=FailureClass::source_run_metadata_failure - failed to resolve source run metadata for run ${SOURCE_RUN_ID}"
            exit 1
          fi
          python -c "import json, os, pathlib; meta=json.loads(pathlib.Path('logs/source-run-meta.json').read_text(encoding='utf-8')); pairs={'status':str(meta.get('status','')).strip(),'conclusion':str(meta.get('conclusion','')).strip(),'event':str(meta.get('event','')).strip(),'head_sha':str(meta.get('headSha','')).strip(),'updated_at':str(meta.get('updatedAt','')).strip(),'run_url':str(meta.get('url','')).strip()}; out=os.environ['GITHUB_OUTPUT']; f=open(out,'a',encoding='utf-8'); [f.write(f'{k}={v}\\n') for k,v in pairs.items()]; f.close()"

      - name: Download benchmark collection artifact
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ steps.source.outputs.run_id }}
          RETRY_DELAYS_S: ${{ github.event.inputs.retry_delays_s || '5,10,20' }}
          RATE_LIMIT_DELAY_S: ${{ github.event.inputs.rate_limit_delay_s || '60' }}
        run: |
          retry_list="${RETRY_DELAYS_S:-5,10,20}"
          IFS=',' read -r -a retry_parts <<<"${retry_list}"
          rm -rf artifact-source
          mkdir -p artifact-source

          run_with_retry() {
            local label="$1"
            shift
            local max_attempts=$(( ${#retry_parts[@]} + 1 ))
            local attempt=0
            local output=""
            last_rate_limited=0

            while [ "${attempt}" -lt "${max_attempts}" ]; do
              echo "${label}_attempt=${attempt}"
              output="$("$@" 2>&1)" && { echo "${output}"; return 0; }
              echo "${output}"

              if [ "${attempt}" -ge "$((max_attempts - 1))" ]; then
                break
              fi

              local base_delay
              base_delay="$(echo "${retry_parts[${attempt}]}" | xargs)"
              if ! [[ "${base_delay}" =~ ^[0-9]+$ ]]; then
                base_delay=20
              fi

              local wait_s="${base_delay}"
              local exp_delay=$((5 * (2 ** attempt)))
              if [ "${exp_delay}" -gt "${wait_s}" ]; then
                wait_s="${exp_delay}"
              fi
              if echo "${output}" | grep -Eiq "429|too many requests|rate limit"; then
                last_rate_limited=1
                local rl_delay
                rl_delay="$(echo "${RATE_LIMIT_DELAY_S:-60}" | xargs)"
                if ! [[ "${rl_delay}" =~ ^[0-9]+$ ]]; then
                  rl_delay=60
                fi
                if [ "${rl_delay}" -gt "${wait_s}" ]; then
                  wait_s="${rl_delay}"
                fi
              fi

              local jitter=$((RANDOM % 8))
              local sleep_s=$((wait_s + jitter))
              echo "${label}_retry_wait_s=${sleep_s}"
              sleep "${sleep_s}"
              attempt=$((attempt + 1))
            done
            return 1
          }

          if ! run_with_retry artifact_download gh run download "${SOURCE_RUN_ID}" --name benchmark-collection --dir artifact-source --repo "${GITHUB_REPOSITORY}"; then
            if [ "${last_rate_limited}" -eq 1 ]; then
              mkdir -p logs
              python -c "import json, pathlib, os; rid=os.environ.get('SOURCE_RUN_ID',''); pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'artifact_download_rate_limited','failure_detail':f'rate limited while downloading benchmark-collection artifact from run {rid}'}, ensure_ascii=False), encoding='utf-8')"
              echo "failure_class=artifact_download_rate_limited"
              echo "failure_detail=rate limited while downloading benchmark-collection artifact from run ${SOURCE_RUN_ID}"
              echo "::error title=FailureClass::artifact_download_rate_limited - rate limited while downloading benchmark-collection artifact from run ${SOURCE_RUN_ID}"
            else
              mkdir -p logs
              python -c "import json, pathlib, os; rid=os.environ.get('SOURCE_RUN_ID',''); pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'artifact_download_failure','failure_detail':f'failed to download benchmark-collection artifact from run {rid}'}, ensure_ascii=False), encoding='utf-8')"
              echo "failure_class=artifact_download_failure"
              echo "failure_detail=failed to download benchmark-collection artifact from run ${SOURCE_RUN_ID}"
              echo "::error title=FailureClass::artifact_download_failure - failed to download benchmark-collection artifact from run ${SOURCE_RUN_ID}"
            fi
            exit 1
          fi

      - name: Validate and apply artifact
        run: |
          if ! python scripts/validate-benchmark-artifact.py --source-dir artifact-source --apply --report-file logs/artifact-validation-report.json; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'artifact_validation_failure','failure_detail':'benchmark artifact schema validation failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "failure_class=artifact_validation_failure"
            echo "failure_detail=benchmark artifact schema validation failed"
            echo "::error title=FailureClass::artifact_validation_failure - benchmark artifact schema validation failed"
            exit 1
          fi

      - name: Prune retired benchmark data
        run: |
          if ! python scripts/prune-retired-benchmark-data.py --report-file logs/retired-prune-report.json; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'retired_data_prune_failure','failure_detail':'failed to prune retired models from benchmark-results payload'}, ensure_ascii=False), encoding='utf-8')"
            echo "failure_class=retired_data_prune_failure"
            echo "failure_detail=failed to prune retired models from benchmark-results payload"
            echo "::error title=FailureClass::retired_data_prune_failure - failed to prune retired models from benchmark-results payload"
            exit 1
          fi

      - name: Generate retirement candidates
        run: |
          if ! python scripts/generate-retirement-candidates.py --output-file src/data/retirement-candidates.json; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'retirement_candidates_failure','failure_detail':'failed to generate retirement candidates from benchmark history'}, ensure_ascii=False), encoding='utf-8')"
            echo "failure_class=retirement_candidates_failure"
            echo "failure_detail=failed to generate retirement candidates from benchmark history"
            echo "::error title=FailureClass::retirement_candidates_failure - failed to generate retirement candidates from benchmark history"
            exit 1
          fi

      - name: Review retirement candidates
        id: retirement_review
        env:
          INPUT_APPLY_RETIREMENT: ${{ github.event.inputs.apply_retirement_candidates }}
          INPUT_MIN_STALE_RUNS: ${{ github.event.inputs.retirement_min_stale_runs }}
          INPUT_MAX_SEEN_OK_COUNT: ${{ github.event.inputs.retirement_max_seen_ok_count }}
        run: |
          apply_flag="${INPUT_APPLY_RETIREMENT}"
          min_stale_runs="${INPUT_MIN_STALE_RUNS}"
          max_seen_ok_count="${INPUT_MAX_SEEN_OK_COUNT}"

          if [ -z "${apply_flag}" ]; then
            apply_flag="false"
          fi
          if [ -z "${min_stale_runs}" ]; then
            min_stale_runs="3"
          fi
          if [ -z "${max_seen_ok_count}" ]; then
            max_seen_ok_count="2"
          fi

          ARGS=(
            --candidates-file src/data/retirement-candidates.json
            --policy-file src/data/retired-models.json
            --proposal-file src/data/retirement-proposal.json
            --min-last-seen-run-index "${min_stale_runs}"
            --max-seen-ok-count "${max_seen_ok_count}"
            --github-output "${GITHUB_OUTPUT}"
          )
          if [ "${apply_flag}" = "true" ]; then
            ARGS+=(--apply)
          fi

          if ! python scripts/review-retirement-candidates.py "${ARGS[@]}"; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'retirement_review_failure','failure_detail':'failed to review retirement candidates'}, ensure_ascii=False), encoding='utf-8')"
            echo "failure_class=retirement_review_failure"
            echo "failure_detail=failed to review retirement candidates"
            echo "::error title=FailureClass::retirement_review_failure - failed to review retirement candidates"
            exit 1
          fi

      - name: Re-prune after retirement apply
        if: steps.retirement_review.outputs.applied_count != '0'
        run: |
          if ! python scripts/prune-retired-benchmark-data.py --report-file logs/retired-prune-report-post-apply.json; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'retirement_apply_prune_failure','failure_detail':'failed to prune benchmark data after retirement apply'}, ensure_ascii=False), encoding='utf-8')"
            echo "failure_class=retirement_apply_prune_failure"
            echo "failure_detail=failed to prune benchmark data after retirement apply"
            echo "::error title=FailureClass::retirement_apply_prune_failure - failed to prune benchmark data after retirement apply"
            exit 1
          fi
          python scripts/generate-retirement-candidates.py --output-file src/data/retirement-candidates.json
          python scripts/review-retirement-candidates.py \
            --candidates-file src/data/retirement-candidates.json \
            --policy-file src/data/retired-models.json \
            --proposal-file src/data/retirement-proposal.json

      - name: Update pipeline status (weekly source)
        run: |
          python scripts/update-pipeline-status.py \
            --workflow-key "weekly_benchmark" \
            --workflow-name "Weekly Benchmark" \
            --run-id "${{ steps.source.outputs.run_id }}" \
            --run-url "${{ steps.source_meta.outputs.run_url }}" \
            --status "${{ steps.source_meta.outputs.status }}" \
            --conclusion "${{ steps.source_meta.outputs.conclusion }}" \
            --event "${{ steps.source_meta.outputs.event }}" \
            --head-sha "${{ steps.source_meta.outputs.head_sha }}" \
            --updated-at "${{ steps.source_meta.outputs.updated_at }}"

      - name: Build model catalog
        run: python scripts/build-model-catalog.py

      - name: Build sitemap
        run: python scripts/build-sitemap.py

      - name: Build conversion funnel snapshot
        run: python scripts/build-conversion-funnel.py

      - name: Build submission review snapshot
        run: python scripts/build-submission-review.py

      - name: Run quality gate
        run: python scripts/quality-gate.py

      - name: Commit and push publish updates
        env:
          RETRY_DELAYS_S: ${{ github.event.inputs.retry_delays_s || '5,10,20' }}
          RATE_LIMIT_DELAY_S: ${{ github.event.inputs.rate_limit_delay_s || '60' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/data/status.json src/data/benchmark-results.json src/data/cluster-benchmarks.json src/data/benchmark-changelog.json src/data/runner-status.json src/data/pipeline-status.json src/data/weekly-target-plan.json src/data/retired-models.json src/data/retirement-candidates.json src/data/retirement-proposal.json src/data/conversion-funnel.json src/data/submission-review.json src/data/models.json src/data/model-catalog.json public/sitemap.xml public/screenshots logs

          if git diff --cached --quiet; then
            echo "publish_result=no_changes"
            exit 0
          fi

          git commit -m "chore: publish benchmark artifact"

          retry_list="${RETRY_DELAYS_S:-5,10,20}"
          IFS=',' read -r -a retry_parts <<<"${retry_list}"

          run_with_retry() {
            local label="$1"
            shift
            local max_attempts=$(( ${#retry_parts[@]} + 1 ))
            local attempt=0
            local output=""
            last_rate_limited=0

            while [ "${attempt}" -lt "${max_attempts}" ]; do
              echo "${label}_attempt=${attempt}"
              output="$("$@" 2>&1)" && { echo "${output}"; return 0; }
              echo "${output}"

              if [ "${attempt}" -ge "$((max_attempts - 1))" ]; then
                break
              fi

              local base_delay
              base_delay="$(echo "${retry_parts[${attempt}]}" | xargs)"
              if ! [[ "${base_delay}" =~ ^[0-9]+$ ]]; then
                base_delay=20
              fi

              local wait_s="${base_delay}"
              local exp_delay=$((5 * (2 ** attempt)))
              if [ "${exp_delay}" -gt "${wait_s}" ]; then
                wait_s="${exp_delay}"
              fi
              if echo "${output}" | grep -Eiq "429|too many requests|rate limit"; then
                last_rate_limited=1
                local rl_delay
                rl_delay="$(echo "${RATE_LIMIT_DELAY_S:-60}" | xargs)"
                if ! [[ "${rl_delay}" =~ ^[0-9]+$ ]]; then
                  rl_delay=60
                fi
                if [ "${rl_delay}" -gt "${wait_s}" ]; then
                  wait_s="${rl_delay}"
                fi
              fi

              local jitter=$((RANDOM % 8))
              local sleep_s=$((wait_s + jitter))
              echo "${label}_retry_wait_s=${sleep_s}"
              sleep "${sleep_s}"
              attempt=$((attempt + 1))
            done
            return 1
          }

          if ! run_with_retry git_push git push; then
            if [ "${last_rate_limited}" -eq 1 ]; then
              mkdir -p logs
              python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'publish_push_rate_limited','failure_detail':'git push rate limited after retries'}, ensure_ascii=False), encoding='utf-8')"
              echo "failure_class=publish_push_rate_limited"
              echo "failure_detail=git push rate limited after retries"
              echo "::error title=FailureClass::publish_push_rate_limited - git push rate limited after retries"
            else
              mkdir -p logs
              python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'publish_push_failure','failure_detail':'git push failed after retries'}, ensure_ascii=False), encoding='utf-8')"
              echo "failure_class=publish_push_failure"
              echo "failure_detail=git push failed after retries"
              echo "::error title=FailureClass::publish_push_failure - git push failed after retries"
            fi
            exit 1
          fi

      - name: Finalize pipeline status (publish)
        id: pipeline_status_publish
        if: always() && steps.checkout.conclusion == 'success'
        env:
          LV_JOB_STATUS: ${{ job.status }}
        run: |
          conclusion="success"
          if [ "${LV_JOB_STATUS}" != "success" ]; then
            conclusion="failure"
          fi

          failure_class=""
          failure_detail=""
          if [ -f logs/failure-context.json ]; then
            failure_class="$(python -c "import json, pathlib; d=json.loads(pathlib.Path('logs/failure-context.json').read_text(encoding='utf-8')); print(str(d.get('failure_class','')).strip())" 2>/dev/null || true)"
            failure_detail="$(python -c "import json, pathlib; d=json.loads(pathlib.Path('logs/failure-context.json').read_text(encoding='utf-8')); print(str(d.get('failure_detail','')).strip())" 2>/dev/null || true)"
          fi
          if [ "${conclusion}" = "success" ]; then
            failure_class="none"
            failure_detail=""
          elif [ -z "${failure_class}" ] || [ "${failure_class}" = "none" ]; then
            failure_class="publish_workflow_failed"
          fi

          python scripts/update-pipeline-status.py \
            --workflow-key "publish_benchmark_artifact" \
            --workflow-name "Publish Benchmark Artifact" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --status "completed" \
            --conclusion "${conclusion}" \
            --event "${GITHUB_EVENT_NAME}" \
            --head-sha "${GITHUB_SHA}" \
            --failure-class "${failure_class}" \
            --failure-detail "${failure_detail}"

          {
            echo "conclusion=${conclusion}"
            echo "failure_class=${failure_class}"
            echo "failure_detail<<EOF"
            echo "${failure_detail}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Persist publish pipeline status snapshot
        if: always() && steps.checkout.conclusion == 'success'
        env:
          RETRY_DELAYS_S: ${{ github.event.inputs.retry_delays_s || '5,10,20' }}
          RATE_LIMIT_DELAY_S: ${{ github.event.inputs.rate_limit_delay_s || '60' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/data/pipeline-status.json
          if git diff --cached --quiet; then
            echo "pipeline status snapshot unchanged; skip sync commit"
            exit 0
          fi

          git commit -m "chore: sync publish pipeline status snapshot"

          retry_list="${RETRY_DELAYS_S:-5,10,20}"
          IFS=',' read -r -a retry_parts <<<"${retry_list}"

          run_with_retry() {
            local label="$1"
            shift
            local max_attempts=$(( ${#retry_parts[@]} + 1 ))
            local attempt=0
            local output=""
            last_rate_limited=0

            while [ "${attempt}" -lt "${max_attempts}" ]; do
              echo "${label}_attempt=${attempt}"
              output="$("$@" 2>&1)" && { echo "${output}"; return 0; }
              echo "${output}"

              if [ "${attempt}" -ge "$((max_attempts - 1))" ]; then
                break
              fi

              local base_delay
              base_delay="$(echo "${retry_parts[${attempt}]}" | xargs)"
              if ! [[ "${base_delay}" =~ ^[0-9]+$ ]]; then
                base_delay=20
              fi

              local wait_s="${base_delay}"
              local exp_delay=$((5 * (2 ** attempt)))
              if [ "${exp_delay}" -gt "${wait_s}" ]; then
                wait_s="${exp_delay}"
              fi
              if echo "${output}" | grep -Eiq "429|too many requests|rate limit"; then
                last_rate_limited=1
                local rl_delay
                rl_delay="$(echo "${RATE_LIMIT_DELAY_S:-60}" | xargs)"
                if ! [[ "${rl_delay}" =~ ^[0-9]+$ ]]; then
                  rl_delay=60
                fi
                if [ "${rl_delay}" -gt "${wait_s}" ]; then
                  wait_s="${rl_delay}"
                fi
              fi

              local jitter=$((RANDOM % 8))
              local sleep_s=$((wait_s + jitter))
              echo "${label}_retry_wait_s=${sleep_s}"
              sleep "${sleep_s}"
              attempt=$((attempt + 1))
            done
            return 1
          }

          if ! run_with_retry git_push_status git push; then
            if [ "${last_rate_limited}" -eq 1 ]; then
              python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'publish_status_sync_rate_limited','failure_detail':'git push rate limited while syncing publish pipeline status snapshot'}, ensure_ascii=False), encoding='utf-8')"
              echo "::error title=FailureClass::publish_status_sync_rate_limited - git push rate limited while syncing publish pipeline status snapshot"
            else
              python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'publish_status_sync_push_failure','failure_detail':'git push failed while syncing publish pipeline status snapshot'}, ensure_ascii=False), encoding='utf-8')"
              echo "::error title=FailureClass::publish_status_sync_push_failure - git push failed while syncing publish pipeline status snapshot"
            fi
            exit 1
          fi

      - name: Upload publish diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-benchmark-diagnostics
          if-no-files-found: warn
          retention-days: 21
          path: |
            logs/artifact-validation-report.json
            logs

      - name: Alert issue (publish checkout failure)
        if: always() && steps.checkout.conclusion == 'failure'
        uses: actions/github-script@v7
        env:
          ALERT_WORKFLOW: Publish Benchmark Artifact
          ALERT_FAILURE_CLASS: publish_checkout_failure
          ALERT_FAILURE_DETAIL: actions/checkout failed in publish workflow
          ALERT_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow = process.env.ALERT_WORKFLOW || "Workflow";
            const failureClass = process.env.ALERT_FAILURE_CLASS || "unknown_failure";
            const failureDetail = process.env.ALERT_FAILURE_DETAIL || "";
            const runUrl = process.env.ALERT_RUN_URL || "";
            const title = `[OPS-ALERT] ${workflow}: ${failureClass}`;
            const marker = `<!-- ops-alert:${workflow}:${failureClass} -->`;
            const now = new Date().toISOString();
            const message = `${marker}

            - Triggered at: ${now}
            - Workflow: ${workflow}
            - Failure class: \`${failureClass}\`
            - Detail: ${failureDetail || "-"}
            - Run: ${runUrl}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: message
              });
              core.info(`commented existing issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: message
              });
              core.info("created new ops alert issue");
            }

      - name: Alert issue (publish failure)
        if: always() && failure() && steps.checkout.conclusion == 'success'
        uses: actions/github-script@v7
        env:
          ALERT_WORKFLOW: Publish Benchmark Artifact
          ALERT_FAILURE_CLASS: ${{ steps.pipeline_status_publish.outputs.failure_class }}
          ALERT_FAILURE_DETAIL: ${{ steps.pipeline_status_publish.outputs.failure_detail }}
          ALERT_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow = process.env.ALERT_WORKFLOW || "Workflow";
            let failureClass = (process.env.ALERT_FAILURE_CLASS || "").trim();
            const failureDetail = (process.env.ALERT_FAILURE_DETAIL || "").trim();
            const runUrl = process.env.ALERT_RUN_URL || "";
            if (!failureClass || failureClass === "none") {
              failureClass = "publish_workflow_failed";
            }
            const title = `[OPS-ALERT] ${workflow}: ${failureClass}`;
            const marker = `<!-- ops-alert:${workflow}:${failureClass} -->`;
            const now = new Date().toISOString();
            const message = `${marker}

            - Triggered at: ${now}
            - Workflow: ${workflow}
            - Failure class: \`${failureClass}\`
            - Detail: ${failureDetail || "-"}
            - Run: ${runUrl}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: message
              });
              core.info(`commented existing issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: message
              });
              core.info("created new ops alert issue");
            }

      - name: Resolve alert issues on recovery (publish)
        if: always() && success() && steps.checkout.conclusion == 'success'
        uses: actions/github-script@v7
        env:
          ALERT_WORKFLOW: Publish Benchmark Artifact
          ALERT_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow = process.env.ALERT_WORKFLOW || "Workflow";
            const runUrl = process.env.ALERT_RUN_URL || "";
            const prefix = `[OPS-ALERT] ${workflow}:`;
            const now = new Date().toISOString();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            const targets = issues.filter((issue) => issue.title.startsWith(prefix));
            for (const issue of targets) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Recovered at ${now}. Latest successful run: ${runUrl}`
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed"
              });
              core.info(`closed recovered alert issue #${issue.number}`);
            }
