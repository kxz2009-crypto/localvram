name: Daily Content Agent

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run content agent
        run: python scripts/daily-content-agent.py

      - name: Review queue drafts risk gate
        run: python scripts/review-content-queue.py

      - name: Auto-publish queue drafts to blog
        run: python scripts/publish-content-queue.py

      - name: Build model catalog
        run: python scripts/build-model-catalog.py

      - name: Build sitemap
        run: python scripts/build-sitemap.py

      - name: Build conversion funnel snapshot
        run: python scripts/build-conversion-funnel.py

      - name: Build submission review snapshot
        run: python scripts/build-submission-review.py

      - name: Build pipeline SLO snapshot
        run: python scripts/build-pipeline-slo.py

      - name: Run quality gate
        run: python scripts/quality-gate.py

      - name: Commit daily updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/daily-updates.json src/data/daily-content-drafts.json src/data/content-publish-log.json src/data/content-review-log.json src/data/pipeline-slo.json src/data/models.json src/data/model-catalog.json src/data/conversion-funnel.json src/data/submission-review.json src/content/blog public/sitemap.xml content-queue
          git diff --cached --quiet || git commit -m "chore: daily content update"
          git push
