name: Daily Content Agent

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  daily-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Classify checkout failure
        if: steps.checkout.conclusion == 'failure'
        run: |
          mkdir -p logs
          python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'checkout_network_failure','failure_detail':'actions/checkout failed before daily content scripts could run'}, ensure_ascii=False), encoding='utf-8')"
          echo "::error title=FailureClass::checkout_network_failure - actions/checkout failed before daily content scripts could run"
          exit 1

      - name: Setup Python
        if: steps.checkout.conclusion == 'success'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare logs dir
        if: always() && steps.checkout.conclusion == 'success'
        run: mkdir -p logs

      - name: Run content agent
        if: steps.checkout.conclusion == 'success'
        run: |
          if ! python scripts/daily-content-agent.py; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'daily-content-agent.py failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - daily-content-agent.py failed"
            exit 1
          fi

      - name: Review queue drafts risk gate
        if: steps.checkout.conclusion == 'success'
        run: |
          if ! python scripts/review-content-queue.py; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'review-content-queue.py failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - review-content-queue.py failed"
            exit 1
          fi

      - name: Auto-publish queue drafts to blog
        if: steps.checkout.conclusion == 'success'
        run: |
          if ! python scripts/publish-content-queue.py; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'publish-content-queue.py failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - publish-content-queue.py failed"
            exit 1
          fi

      - name: Sync i18n blog copy coverage
        if: steps.checkout.conclusion == 'success'
        run: |
          if ! python scripts/sync-i18n-blog-copy.py; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'sync-i18n-blog-copy.py failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - sync-i18n-blog-copy.py failed"
            exit 1
          fi

      - name: Auto-fill CN zh blog body for newly published posts
        if: steps.checkout.conclusion == 'success'
        run: |
          published_slugs="$(python -c "import json, pathlib; p=pathlib.Path('src/data/content-publish-log.json'); d=json.loads(p.read_text(encoding='utf-8-sig')) if p.exists() else {}; r=d.get('last_run',{}) if isinstance(d,dict) else {}; print(','.join([str(i.get('slug','')).strip() for i in r.get('published',[]) if isinstance(i,dict) and str(i.get('slug','')).strip()]))" 2>/dev/null || true)"
          if [ -z "${published_slugs}" ]; then
            echo "no newly published slugs in this run, skip zh auto-fill"
            exit 0
          fi
          echo "published_slugs=${published_slugs}"
          if ! python scripts/auto-fill-i18n-blog-body.py --locales zh --slugs "${published_slugs}" --overwrite; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'auto-fill-i18n-blog-body.py --locales zh failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - auto-fill-i18n-blog-body.py --locales zh failed"
            exit 1
          fi

      - name: Enforce CN blog zh sync
        if: steps.checkout.conclusion == 'success'
        run: |
          if ! python scripts/check-cn-blog-sync.py; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'check-cn-blog-sync.py failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - check-cn-blog-sync.py failed"
            exit 1
          fi

      - name: Build model catalog
        if: steps.checkout.conclusion == 'success'
        run: |
          if ! python scripts/build-model-catalog.py; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'build-model-catalog.py failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - build-model-catalog.py failed"
            exit 1
          fi

      - name: Build sitemap
        if: steps.checkout.conclusion == 'success'
        run: |
          if ! python scripts/build-sitemap.py; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'build-sitemap.py failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - build-sitemap.py failed"
            exit 1
          fi

      - name: Sync affiliate events from Cloudflare KV (optional)
        if: steps.checkout.conclusion == 'success'
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_AFFILIATE_EVENTS_NAMESPACE_ID: ${{ secrets.CF_AFFILIATE_EVENTS_NAMESPACE_ID }}
        run: |
          if [ -z "${CF_ACCOUNT_ID}" ] || [ -z "${CF_API_TOKEN}" ] || [ -z "${CF_AFFILIATE_EVENTS_NAMESPACE_ID}" ]; then
            echo "::warning title=AffiliateSyncSkipped::Cloudflare KV secrets missing; keep existing affiliate events snapshot."
            exit 0
          fi
          if ! python scripts/export-affiliate-kv-events.py --output-file logs/affiliate-events-export.json --max-keys 5000; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'export-affiliate-kv-events.py failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - export-affiliate-kv-events.py failed"
            exit 1
          fi
          if ! python scripts/import-affiliate-events.py --source-file logs/affiliate-events-export.json --source-format json --source-label cloudflare_kv_api_sync; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'import-affiliate-events.py failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - import-affiliate-events.py failed"
            exit 1
          fi

      - name: Build conversion funnel snapshot
        if: steps.checkout.conclusion == 'success'
        run: |
          if ! python scripts/build-conversion-funnel.py; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'build-conversion-funnel.py failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - build-conversion-funnel.py failed"
            exit 1
          fi

      - name: Build submission review snapshot
        if: steps.checkout.conclusion == 'success'
        run: |
          if ! python scripts/build-submission-review.py; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'build-submission-review.py failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - build-submission-review.py failed"
            exit 1
          fi

      - name: Build pipeline SLO snapshot
        if: steps.checkout.conclusion == 'success'
        run: |
          if ! python scripts/build-pipeline-slo.py; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'build-pipeline-slo.py failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - build-pipeline-slo.py failed"
            exit 1
          fi

      - name: Run quality gate
        if: steps.checkout.conclusion == 'success'
        run: |
          if ! python scripts/quality-gate.py; then
            python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_failed','failure_detail':'quality-gate.py failed'}, ensure_ascii=False), encoding='utf-8')"
            echo "::error title=FailureClass::daily_content_failed - quality-gate.py failed"
            exit 1
          fi

      - name: Commit daily updates
        if: steps.checkout.conclusion == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/daily-updates.json src/data/daily-content-drafts.json src/data/content-publish-log.json src/data/content-review-log.json src/data/pipeline-slo.json src/data/pipeline-status.json src/data/models.json src/data/model-catalog.json src/data/conversion-funnel.json src/data/submission-review.json src/data/affiliate-click-events.json src/content/blog src/content/blog-i18n/zh public/sitemap.xml public/sitemap-*.xml content-queue

          if git diff --cached --quiet; then
            echo "daily_publish_result=no_changes"
            exit 0
          fi

          git commit -m "chore: daily content update"

          retry_parts=(5 10 20)
          run_with_retry() {
            local label="$1"
            shift
            local max_attempts=$(( ${#retry_parts[@]} + 1 ))
            local attempt=0
            local output=""
            local last_rate_limited=0

            while [ "${attempt}" -lt "${max_attempts}" ]; do
              echo "${label}_attempt=${attempt}"
              output="$("$@" 2>&1)" && { echo "${output}"; return 0; }
              echo "${output}"
              if [ "${attempt}" -ge "$((max_attempts - 1))" ]; then
                break
              fi

              local wait_s="${retry_parts[${attempt}]}"
              if echo "${output}" | grep -Eiq "429|too many requests|rate limit"; then
                last_rate_limited=1
                if [ 60 -gt "${wait_s}" ]; then
                  wait_s=60
                fi
              fi
              local jitter=$((RANDOM % 8))
              sleep $((wait_s + jitter))
              attempt=$((attempt + 1))
            done
            if [ "${last_rate_limited}" -eq 1 ]; then
              python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_push_failure','failure_detail':'git push rate limited during daily content commit'}, ensure_ascii=False), encoding='utf-8')"
            else
              python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_push_failure','failure_detail':'git push failed during daily content commit'}, ensure_ascii=False), encoding='utf-8')"
            fi
            return 1
          }

          run_with_retry git_push git push

      - name: Evaluate daily publish outcome
        id: publish_guard
        if: always() && steps.checkout.conclusion == 'success'
        run: |
          published_count="$(python -c "import json, pathlib; p=pathlib.Path('src/data/content-publish-log.json'); d=json.loads(p.read_text(encoding='utf-8-sig')) if p.exists() else {}; r=d.get('last_run',{}) if isinstance(d,dict) else {}; print(int(r.get('published_count',0) or 0))" 2>/dev/null || echo 0)"
          candidate_count="$(python -c "import json, pathlib; p=pathlib.Path('src/data/content-publish-log.json'); d=json.loads(p.read_text(encoding='utf-8-sig')) if p.exists() else {}; r=d.get('last_run',{}) if isinstance(d,dict) else {}; print(int(r.get('candidate_count',0) or 0))" 2>/dev/null || echo 0)"
          queue_date="$(python -c "import json, pathlib; p=pathlib.Path('src/data/content-publish-log.json'); d=json.loads(p.read_text(encoding='utf-8-sig')) if p.exists() else {}; r=d.get('last_run',{}) if isinstance(d,dict) else {}; print(str(r.get('queue_date','')).strip())" 2>/dev/null || true)"

          if [ -z "${queue_date}" ]; then
            queue_date="$(date -u +%F)"
          fi

          {
            echo "published_count=${published_count}"
            echo "candidate_count=${candidate_count}"
            echo "queue_date=${queue_date}"
          } >> "${GITHUB_OUTPUT}"

          if [ "${published_count}" -le 0 ]; then
            echo "zero_publish=true" >> "${GITHUB_OUTPUT}"
            echo "::warning title=ZeroPublishDetected::daily content run completed with published_count=0 (queue_date=${queue_date}, candidate_count=${candidate_count})"
          else
            echo "zero_publish=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Finalize pipeline status (daily)
        id: pipeline_status_daily
        if: always() && steps.checkout.conclusion == 'success'
        env:
          LV_JOB_STATUS: ${{ job.status }}
        run: |
          conclusion="success"
          if [ "${LV_JOB_STATUS}" != "success" ]; then
            conclusion="failure"
          fi

          failure_class=""
          failure_detail=""
          if [ -f logs/failure-context.json ]; then
            failure_class="$(python -c "import json, pathlib; d=json.loads(pathlib.Path('logs/failure-context.json').read_text(encoding='utf-8')); print(str(d.get('failure_class','')).strip())" 2>/dev/null || true)"
            failure_detail="$(python -c "import json, pathlib; d=json.loads(pathlib.Path('logs/failure-context.json').read_text(encoding='utf-8')); print(str(d.get('failure_detail','')).strip())" 2>/dev/null || true)"
          fi
          if [ "${conclusion}" = "success" ]; then
            failure_class="none"
            failure_detail=""
          elif [ -z "${failure_class}" ] || [ "${failure_class}" = "none" ]; then
            failure_class="daily_content_failed"
          fi

          python scripts/update-pipeline-status.py \
            --workflow-key "daily_content" \
            --workflow-name "Daily Content Agent" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --status "completed" \
            --conclusion "${conclusion}" \
            --event "${GITHUB_EVENT_NAME}" \
            --head-sha "${GITHUB_SHA}" \
            --failure-class "${failure_class}" \
            --failure-detail "${failure_detail}"

          {
            echo "conclusion=${conclusion}"
            echo "failure_class=${failure_class}"
            echo "failure_detail<<EOF"
            echo "${failure_detail}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Rebuild pipeline SLO snapshot (daily final)
        if: always() && steps.checkout.conclusion == 'success'
        run: python scripts/build-pipeline-slo.py

      - name: Persist daily pipeline status snapshot
        if: always() && steps.checkout.conclusion == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/pipeline-status.json src/data/pipeline-slo.json

          if git diff --cached --quiet; then
            echo "daily_status_sync=no_changes"
            exit 0
          fi

          git commit -m "chore: sync daily pipeline status snapshot"

          retry_parts=(5 10 20)
          run_with_retry() {
            local label="$1"
            shift
            local max_attempts=$(( ${#retry_parts[@]} + 1 ))
            local attempt=0
            local output=""
            local last_rate_limited=0

            while [ "${attempt}" -lt "${max_attempts}" ]; do
              echo "${label}_attempt=${attempt}"
              output="$("$@" 2>&1)" && { echo "${output}"; return 0; }
              echo "${output}"
              if [ "${attempt}" -ge "$((max_attempts - 1))" ]; then
                break
              fi

              local wait_s="${retry_parts[${attempt}]}"
              if echo "${output}" | grep -Eiq "429|too many requests|rate limit"; then
                last_rate_limited=1
                if [ 60 -gt "${wait_s}" ]; then
                  wait_s=60
                fi
              fi
              local jitter=$((RANDOM % 8))
              sleep $((wait_s + jitter))
              attempt=$((attempt + 1))
            done

            if [ "${last_rate_limited}" -eq 1 ]; then
              python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_status_sync_failure','failure_detail':'git push rate limited while syncing daily pipeline status snapshot'}, ensure_ascii=False), encoding='utf-8')"
            else
              python -c "import json, pathlib; pathlib.Path('logs/failure-context.json').write_text(json.dumps({'failure_class':'daily_content_status_sync_failure','failure_detail':'git push failed while syncing daily pipeline status snapshot'}, ensure_ascii=False), encoding='utf-8')"
            fi
            return 1
          }

          run_with_retry git_push git push

      - name: Upload daily diagnostics
        if: always() && steps.checkout.conclusion == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: daily-content-diagnostics
          if-no-files-found: warn
          retention-days: 14
          path: |
            logs
            src/data/pipeline-status.json
            src/data/pipeline-slo.json
            src/data/content-review-log.json
            src/data/content-publish-log.json
            src/data/submission-review.json

      - name: Alert issue (daily checkout failure)
        if: always() && steps.checkout.conclusion == 'failure'
        uses: actions/github-script@v7
        env:
          ALERT_WORKFLOW: Daily Content Agent
          ALERT_FAILURE_CLASS: checkout_network_failure
          ALERT_FAILURE_DETAIL: actions/checkout failed before daily content scripts could run
          ALERT_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow = process.env.ALERT_WORKFLOW || "Workflow";
            const failureClass = process.env.ALERT_FAILURE_CLASS || "unknown_failure";
            const failureDetail = process.env.ALERT_FAILURE_DETAIL || "";
            const runUrl = process.env.ALERT_RUN_URL || "";
            const title = `[OPS-ALERT] ${workflow}: ${failureClass}`;
            const marker = `<!-- ops-alert:${workflow}:${failureClass} -->`;
            const now = new Date().toISOString();
            const message = `${marker}

            - Triggered at: ${now}
            - Workflow: ${workflow}
            - Failure class: \`${failureClass}\`
            - Detail: ${failureDetail || "-"}
            - Run: ${runUrl}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: message
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: message
              });
            }

      - name: Alert issue (daily failure)
        if: always() && failure() && steps.checkout.conclusion == 'success'
        uses: actions/github-script@v7
        env:
          ALERT_WORKFLOW: Daily Content Agent
          ALERT_FAILURE_CLASS: ${{ steps.pipeline_status_daily.outputs.failure_class }}
          ALERT_FAILURE_DETAIL: ${{ steps.pipeline_status_daily.outputs.failure_detail }}
          ALERT_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow = process.env.ALERT_WORKFLOW || "Workflow";
            let failureClass = (process.env.ALERT_FAILURE_CLASS || "").trim();
            const failureDetail = (process.env.ALERT_FAILURE_DETAIL || "").trim();
            const runUrl = process.env.ALERT_RUN_URL || "";
            if (!failureClass || failureClass === "none") {
              failureClass = "daily_content_failed";
            }
            const title = `[OPS-ALERT] ${workflow}: ${failureClass}`;
            const marker = `<!-- ops-alert:${workflow}:${failureClass} -->`;
            const now = new Date().toISOString();
            const message = `${marker}

            - Triggered at: ${now}
            - Workflow: ${workflow}
            - Failure class: \`${failureClass}\`
            - Detail: ${failureDetail || "-"}
            - Run: ${runUrl}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: message
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: message
              });
            }

      - name: Alert issue (daily zero publish)
        if: always() && steps.checkout.conclusion == 'success' && steps.publish_guard.outputs.zero_publish == 'true'
        uses: actions/github-script@v7
        env:
          ALERT_WORKFLOW: Daily Content Agent
          ALERT_FAILURE_CLASS: daily_content_zero_publish
          ALERT_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_QUEUE_DATE: ${{ steps.publish_guard.outputs.queue_date }}
          ALERT_PUBLISHED_COUNT: ${{ steps.publish_guard.outputs.published_count }}
          ALERT_CANDIDATE_COUNT: ${{ steps.publish_guard.outputs.candidate_count }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow = process.env.ALERT_WORKFLOW || "Workflow";
            const failureClass = process.env.ALERT_FAILURE_CLASS || "daily_content_zero_publish";
            const runUrl = process.env.ALERT_RUN_URL || "";
            const queueDate = process.env.ALERT_QUEUE_DATE || "";
            const publishedCount = process.env.ALERT_PUBLISHED_COUNT || "0";
            const candidateCount = process.env.ALERT_CANDIDATE_COUNT || "0";
            const title = `[OPS-ALERT] ${workflow}: ${failureClass}`;
            const marker = `<!-- ops-alert:${workflow}:${failureClass} -->`;
            const now = new Date().toISOString();
            const message = `${marker}

            - Triggered at: ${now}
            - Workflow: ${workflow}
            - Failure class: \`${failureClass}\`
            - Queue date: ${queueDate || "-"}
            - Candidate count: ${candidateCount}
            - Published count: ${publishedCount}
            - Run: ${runUrl}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: message
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: message
              });
            }

      - name: Resolve alert issues on recovery (daily)
        if: always() && success() && steps.checkout.conclusion == 'success' && steps.publish_guard.outputs.zero_publish != 'true'
        uses: actions/github-script@v7
        env:
          ALERT_WORKFLOW: Daily Content Agent
          ALERT_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow = process.env.ALERT_WORKFLOW || "Workflow";
            const runUrl = process.env.ALERT_RUN_URL || "";
            const prefix = `[OPS-ALERT] ${workflow}:`;
            const now = new Date().toISOString();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            const targets = issues.filter((issue) => issue.title.startsWith(prefix));
            for (const issue of targets) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Recovered at ${now}. Latest successful run: ${runUrl}`
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed"
              });
            }
