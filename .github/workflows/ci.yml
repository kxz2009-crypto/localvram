name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install actionlint
        run: |
          curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- latest

      - name: Lint GitHub Actions workflows
        run: ./actionlint -color

  quality-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm install

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Verify affiliate link mappings
        run: python scripts/refresh-affiliate-funnel.py --verify-only --verify-links

      - name: Quality gate
        run: python scripts/quality-gate.py

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: "1"

      - name: Smoke tests
        run: npm run test:smoke
