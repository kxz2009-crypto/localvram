name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm install

      - name: Quality gate
        run: python scripts/quality-gate.py

      - name: Build
        run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
